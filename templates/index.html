<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>HUNTER SNIPER PANEL</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 10px; background: #111; }
        textarea { width: 100%; height: 200px; background: #000; color: #fff; border: 1px solid #00ff00; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; background: #222; padding: 10px; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #00ff00; color: #000; font-weight: bold; cursor: pointer; border: none; font-size: 1.2rem; }
        .log-area { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; height: 300px; overflow-y: auto; text-align: left; }
        .LIVE { color: #f9ff00; font-weight: bold; }
        .DEAD { color: #ff3333; }
        .ERROR { color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ HUNTER SNIPER V100 ]</h1>
        <div class="stats">
            <span>LIVE: <b id="live-count">0</b></span>
            <span>DEAD: <b id="dead-count">0</b></span>
            <span>TOTAL: <b id="total-count">0</b></span>
        </div>
        <textarea id="cc-list" placeholder="ضع البطاقات هنا: 4847...|03|28|110"></textarea>
        <button id="start-btn" onclick="startSniper()">إطلاق القنص ⚡</button>
        <div id="status-msg" style="margin-top: 10px;"></div>
        <div id="log-area" class="log-area"></div>
    </div>

    <script>
        let live = 0, dead = 0;
        async function startSniper() {
            const lines = document.getElementById('cc-list').value.split('\n').filter(l => l.trim() !== "");
            const btn = document.getElementById('start-btn');
            const log = document.getElementById('log-area');
            
            btn.disabled = true;
            btn.style.opacity = "0.5";
            
            for (let i = 0; i < lines.length; i++) {
                document.getElementById('status-msg').innerText = `جاري فحص ${i+1} من ${lines.length}...`;
                
                try {
                    const res = await fetch('/api/check', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({cc: lines[i].trim()})
                    });
                    const data = await res.json();
                    
                    if(data.status === "LIVE") live++; else if(data.status === "DEAD") dead++;
                    
                    updateStats(lines.length);
                    log.innerHTML = `<div class="${data.status}">[${data.status}] ${lines[i]} -> ${data.msg}</div>` + log.innerHTML;
                    
                } catch(e) {
                    log.innerHTML = `<div class="ERROR">[ERROR] فشل الاتصال بالسيرفر</div>` + log.innerHTML;
                }
                
                // فاصل 5 ثوانٍ
                if(i < lines.length - 1) await new Promise(r => setTimeout(r, 5000));
            }
            btn.disabled = false;
            btn.style.opacity = "1";
            document.getElementById('status-msg').innerText = "تم اكتمال العملية ✅";
        }

        function updateStats(total) {
            document.getElementById('live-count').innerText = live;
            document.getElementById('dead-count').innerText = dead;
            document.getElementById('total-count').innerText = total;
        }
    </script>
</body>
</html>
